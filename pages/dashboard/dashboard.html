<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Gol Ahora</title>
    <meta name="description" content="Panel administrativo de Gol Ahora para gestión de reservas, clientes, canchas, pagos y torneos." />
    <link rel="stylesheet" href="../../css/global/variables.css" />
    <link rel="stylesheet" href="../../css/global/reset.css" />
    <link rel="stylesheet" href="../../css/global/layout.css" />
    <link rel="stylesheet" href="../../css/global/components.css" />
    <link rel="stylesheet" href="../../css/pages/dashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/favicon.png" type="image/png">
    <!-- Scripts: los módulos primero, el router al final -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../js/pages/dashboard.js"></script>
    <script src="../../js/modules/usuarios/usuarios.js"></script>
    <script src="../../js/modules/usuarios/profesores.js"></script>
    <script src="../../js/modules/usuarios/empleados.js"></script>
    <script src="../../js/modules/canchas/canchas.js"></script> 
</head>

<body>
    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <a href="../../../index.html" class="logo">
                    <span class="logo-ball">⚽</span>
                    <span>Gol Ahora</span>
                </a>
                <nav class="sidebar-nav">

                    <!-- GENERAL -->
                    <div class="nav-section">
                        <p class="nav-title">General</p>
                        <a href="#" class="nav-link active" data-view="home" data-label="Dashboard">
                            <i data-lucide="layout-dashboard"></i>
                            Dashboard
                        </a>
                    </div>

                    <!-- OPERACIONES -->
                    <div class="nav-section">
                        <p class="nav-title">Operaciones</p>
                        <a href="#" class="nav-link" data-view="reservas" data-label="Reservas">
                            <i data-lucide="calendar-days"></i>
                            Reservas
                        </a>
                        <a href="#" class="nav-link" data-view="canchas" data-label="Canchas">
                            <i data-lucide="goal"></i>
                            Canchas
                        </a>
                        <a href="#" class="nav-link" data-view="torneos" data-label="Torneos">
                            <i data-lucide="trophy"></i>
                            Torneos
                        </a>
                        <a href="#" class="nav-link" data-view="clases" data-label="Clases">
                            <i data-lucide="dumbbell"></i>
                            Clases
                        </a>
                    </div>

                    <!-- PERSONAS -->
                    <div class="nav-section">
                        <p class="nav-title">Personas</p>
                        <a href="#" class="nav-link" data-view="usuarios" data-label="Clientes">
                            <i data-lucide="users"></i>
                            Clientes
                        </a>
                        <a href="#" class="nav-link" data-view="profesores" data-label="Profesores">
                            <i data-lucide="user-round"></i>
                            Profesores
                        </a>
                        <a href="#" class="nav-link" data-view="empleados" data-label="Empleados">
                            <i data-lucide="briefcase"></i>
                            Empleados
                        </a>
                        <a href="#" class="nav-link" data-view="asistencias" data-label="Asistencias">
                            <i data-lucide="clipboard-check"></i>
                            Asistencias
                        </a>
                    </div>

                    <!-- FINANZAS -->
                    <div class="nav-section">
                        <p class="nav-title">Finanzas</p>
                        <a href="#" class="nav-link" data-view="cobros" data-label="Cobros">
                            <i data-lucide="wallet"></i>
                            Cobros
                        </a>
                        <a href="#" class="nav-link" data-view="recibos" data-label="Recibos">
                            <i data-lucide="receipt"></i>
                            Recibos
                        </a>
                        <a href="#" class="nav-link" data-view="reportes" data-label="Reportes">
                            <i data-lucide="bar-chart-3"></i>
                            Reportes
                        </a>
                    </div>

                    <!-- SISTEMA -->
                    <div class="nav-section">
                        <p class="nav-title">Sistema</p>
                        <a href="#" class="nav-link" data-view="configuracion" data-label="Configuración">
                            <i data-lucide="settings"></i>
                            Configuración
                        </a>
                    </div>
                </nav>
            </div>

            <!-- USER -->
            <div class="sidebar-user">
                <div class="user-avatar">F</div>
                <div class="user-info">
                    <strong>Franco</strong>
                    <span>Administrador</span>
                </div>
                <button class="logout-btn" aria-label="Cerrar sesión" id="logout-btn">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- MAIN -->
        <main class="main-content" id="main-content">

            <!-- TOPBAR -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
                        <i data-lucide="menu"></i>
                    </button>
                    <div>
                        <h1 id="topbar-title">Dashboard</h1>
                        <p id="topbar-subtitle">Bienvenido al panel de administración.</p>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn" aria-label="Notificaciones">
                        <i data-lucide="bell"></i>
                    </button>
                    <button class="icon-btn" aria-label="Configuración">
                        <i data-lucide="settings-2"></i>
                    </button>
                </div>
            </header>

            <!-- CONTENIDO DINÁMICO -->
            <section class="dashboard-content" id="dashboard-content">
                <!-- El router inyecta el contenido acá -->
            </section>

        </main>
    </div>
</body>
</html>
