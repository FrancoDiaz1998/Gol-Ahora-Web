<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <meta property="og:title" content="Iniciar sesión | Gol Ahora">
    <meta property="og:description" content="Accedé a tu cuenta y reservá en segundos.">
    <meta property="og:type" content="website">
    <meta name="description" content="Iniciá sesión en Gol Ahora y gestioná tus reservas deportivas.">
    <meta name="keywords" content="login, iniciar sesión, acceso, reservas deportivas">
    <meta name="author" content="Grupo 2 - Comisión 1">
    <link rel="preload" as="image" href="../../assets/RLMobile.png">
    <link rel="preload" as="image" href="../../assets/RLDesktop.png">
    <link rel="stylesheet" href="../../css/pages/login.css">
    <script src="../../js/pages/login.js" defer></script>
    <link rel="icon" href="../../assets/favicon.png" type="image/png">
</head>
<body>
    <header>
        <div class="contenedor-header">
            <a href="../index.html" class="button-volver">Volver al inicio</a>
        </div>
    </header>
    <main>
        <section class="contenedor-formulario" aria-labelledby="titulo-login">
            <form action="#" method="POST" class="formulario">
                <h1>Iniciar sesión</h1>
                <div class="grupos-elem">
                    <label for="username">Usuario/Email:</label>
                    <input type="text" id="username" name="username" autocomplete="email" required>
                    <small class="error-message" id="error-username"></small>
                </div>
                <div class="grupos-elem">
                    <label for="password">Contraseña:</label>
                    <div class="password-wrapper">  
                         <input type="password" id="password" name="password" minlength="6" required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">👁️
                        </button>
                    </div>
                   <small class="error-message" id="error-password"></small>
                </div>
                <div class="grupos-elem enlaces">
                    <a href="#" class="link-secundario">
                        ¿Olvidaste tu contraseña?
                    </a>
                    <a href="./registro.html" class="link-principal">
                        Crear cuenta
                    </a>
                </div>
                <div class="grupos-elem button-sub">
                    <button onclick="window.location.href='../dashboard/dashboard.html'" type="button" class="button-submit">Ingresar</button>
                </div>
            </form>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
