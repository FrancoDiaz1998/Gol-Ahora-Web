<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <meta name="description" content="Creá tu cuenta en Gol Ahora y empezá a reservar canchas de fútbol en segundos.">
    <meta name="keywords" content="registro, crear cuenta, reserva canchas, fútbol">
    <meta name="author" content="Grupo 2 - Comisión 1">

    <meta property="og:title" content="Registro | Gol Ahora">
    <meta property="og:description" content="Registrate y empezá a jugar hoy mismo.">
    <script src="../js/registro.js" defer></script>
    <link rel="preload" as="image" href="../assets/RLMobile.png">
    <link rel="preload" as="image" href="../assets/RLDesktop.png">
    <link rel="stylesheet" href="../css/registro.css">
    <link rel="icon" href="../assets/favicon.png" type="image/png">
</head>
<body>
    <header>
        <div class="contenedor-header">
            <a href="../index.html" class="button-volver">Volver al inicio</a>
        </div>
    </header>
    <main>
        <section class="contenedor-formulario">
            <form class="formulario" action="#" method="POST" novalidate>
                <h1>Crear cuenta</h1>
                <div class="grupos-elem nom-ape">
                    <label for="nombre">Nombres:</label>
                    <input type="text" id="nombre" name="nombre"  class="input-nombre"  autocomplete="given-name" required>
                    <small class="error-message" id="error-nombre"></small>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido"  class="input-apellido" autocomplete="family-name" required>
                    <small class="error-message" id="error-apellido"></small>
                </div>
                <div class="grupos-elem">
                    <label for="dni">Dni:</label>
                    <input type="text" id="dni" name="dni" class="input-dni" inputmode="numeric" pattern="[0-9]{7,8}" placeholder="Ej: 40255711" required>
                    <small class="error-message" id="error-dni"></small>
                </div>
                <div class="grupos-elem">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" name="telefono" class="input-telefono " autocomplete="tel" placeholder="+54 11..." required>
                    <small class="error-message" id="error-telefono"></small>
                </div>
                 <div class="grupos-elem">
                    <label for="user">Nombre de Usuario:</label>
                    <input type="text" id="user" name="user" class="input-user" autocomplete="username" required>
                    <small class="error-message" id="error-user"></small>
                </div>
                <div class="grupos-elem">
                    <label for="email">Correo:</label>
                    <input type="email" id="email" name="email" class="input-email" autocomplete="email" required>
                    <small class="error-message" id="error-email"></small>
                </div>
                <div class="grupos-elem password-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" minlength="6" required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">👁️
                        </button>
                    </div>
                    <small class="error-message" id="error-password"></small>
                </div>
                 <div class="grupos-elem enlaces">
                    <a href="./login.html" class="link-principal">
                        ¿Ya tenes una cuenta?
                    </a>
                </div>
                <div class="grupos-elem button-sub">
                    <button type="submit" class="button-submit">Crear cuenta</button>
                </div>
                
            </form>
        </section>

    </main>
    <footer>

    </footer>
</body>
</html>
