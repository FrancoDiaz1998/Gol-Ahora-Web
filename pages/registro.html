<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="registro.css">
    <link rel="icon" href="./assets/favicon.png" type="image/png">
</head>
<body>
    <header>
        <div class="contenedor-header">
            <a href="../index.html">
                <button class="button-volver">Volver al inicio</button>
            </a>
        </div>
    </header>
    <main>
        <section class="contenedor-formulario">
            <form class="formulario">
                <h2>¡Bienvenido!</h2>
                <div class="grupos-elem nom-ape">
                    <label for="nombre">Nombres:</label>
                    <input type="text" id="nombre" name="nombre"  class="input-nombre" required>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido"  class="input-apellido" required>
                </div>
                <div class="grupos-elem">
                    <label for="dni">Dni:</label>
                    <input type="text" id="dni" name="dni" class="input-dni" required>
                </div>
                <div class="grupos-elem">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" name="telefono" class="input-telefono" placeholder="+54..." required>
                </div>
                 <div class="grupos-elem">
                    <label for="user">Nombre de Usuario:</label>
                    <input type="text" id="user" name="user" class="input-user" required>
                </div>
                <div class="grupos-elem">
                    <label for="email">Correo:</label>
                    <input type="email" id="email" name="email" class="input-email" required>
                </div>
                <div class="grupos-elem">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" class="input-password" required>
                </div>
                <div class="grupos-elem">
                    
                </div>
                <div class="grupos-elem button-sub">
                    <button type="submit" class="button-submit">Registrarse</button>
                </div>
                
            </form>
        </section>

    </main>
    <footer>

    </footer>
</body>
</html>
